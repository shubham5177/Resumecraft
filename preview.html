<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Preview — ResumeCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
         :root {
            --primary-color: #ff006e;
            --secondary-color: #a100f2;
            --black: #000000;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --border-width: 2px;
            --border-radius: 12px;
            --shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            --shadow-hover: 12px 12px 0px rgba(0, 0, 0, 0.3);
        }
        
        body {
            background-color: var(--white) !important;
            color: var(--black) !important;
        }
        
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--black) !important;
        }
        
        p,
        a:not(.btn-primary-custom):not(.btn-outline-custom) {
            color: var(--black) !important;
        }
        
        .preview-page {
            max-width: 960px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        #resumeContent {
            background: #fff !important;
            color: var(--black) !important;
            border: var(--border-width) solid var(--black);
            border-radius: var(--border-radius);
            overflow: hidden;
            box-shadow: var(--shadow);
        }
        
        .btn-primary-custom {
            background-color: var(--primary-color);
            color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
        }
        
        .btn-primary-custom:hover {
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
        
        .btn-outline-custom {
            background-color: rgba(255, 255, 255, 0.95) !important;
            color: #ff006e !important;
            border: var(--border-width) solid #fff !important;
            border-radius: 8px;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
            transition: all 0.3s ease;
        }
        
        .btn-outline-custom:hover {
            background-color: #fff !important;
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.2);
            transform: translate(-2px, -2px);
        }
        
        .preview-controls .btn-primary-custom {
            background-color: #fff !important;
            color: #ff006e !important;
            border: var(--border-width) solid #fff !important;
            box-shadow: 4px 4px 0px rgba(0, 0, 0, 0.15);
        }
        
        .preview-controls .btn-primary-custom:hover {
            box-shadow: 6px 6px 0px rgba(0, 0, 0, 0.2);
            transform: translate(-2px, -2px);
        }
        
        input,
        textarea,
        select {
            background-color: var(--white) !important;
            color: var(--black) !important;
            border-color: var(--black) !important;
        }
        
        input::placeholder,
        textarea::placeholder {
            color: #999 !important;
        }
    </style>
</head>

<body>
    <div class="preview-page">
        <div class="preview-controls" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;background:linear-gradient(135deg, #ff006e 0%, #a100f2 100%);padding:1.5rem;border-radius:12px;border:2px solid #000;box-shadow:8px 8px 0px rgba(0,0,0,0.2)">
            <a href="javascript:history.back()" style="display:flex;align-items:center;gap:0.5rem;color:#fff;font-size:0.9rem;text-decoration:none;font-weight:600">
                <i class="bi bi-arrow-left"></i> Back
            </a>
            <div style="display:flex;gap:0.75rem;flex-wrap:wrap">
                <a href="#" id="editBtn" class="btn-outline-custom" style="font-size:0.88rem;padding:0.55rem 1.2rem;background:#fff !important;color:#ff006e !important;border:2px solid #fff !important"><i class="bi bi-pencil me-1"></i>Edit</a>
                <button onclick="window.print()" class="btn-outline-custom" style="font-size:0.88rem;padding:0.55rem 1.2rem;background:#fff !important;color:#ff006e !important;border:2px solid #fff !important"><i class="bi bi-printer me-1"></i>Print</button>
                <button onclick="downloadPDF()" class="btn-primary-custom" id="downloadBtn" style="font-size:0.88rem;padding:0.55rem 1.4rem;background:#fff !important;color:#ff006e !important;border:2px solid #fff !important">
                    <i class="bi bi-download me-1"></i>Download PDF
                </button>
            </div>
        </div>
        <div id="resumeContent">
            <div id="loadingPlaceholder" style="padding:4rem;text-align:center;color:#999">
                <div style="font-size:1.5rem;margin-bottom:0.5rem">⏳</div>
                Loading resume...
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script type="module" src="./js/preview.js"></script>
</body>

</html>
