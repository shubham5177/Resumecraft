<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email — ResumeCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
         :root {
            --primary-color: #ff006e;
            --secondary-color: #a100f2;
            --black: #000000;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --border-width: 2px;
            --border-radius: 12px;
            --shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            --shadow-hover: 12px 12px 0px rgba(0, 0, 0, 0.3);
        }
        
        body {
            background-color: var(--white) !important;
            color: var(--black) !important;
        }
        
        h1,
        h2,
        h3,
        h4,
        h5,
        h6 {
            color: var(--black) !important;
        }
        
        p,
        a {
            color: var(--black) !important;
        }
        
        .auth-card {
            border: var(--border-width) solid var(--black);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            background-color: rgba(255, 255, 255, 0.98) !important;
            color: var(--black);
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        
        .auth-logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--black);
        }
        
        .btn-primary-custom {
            background-color: var(--primary-color);
            color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-weight: 700;
            transition: all 0.3s ease;
            padding: 0.85rem;
            cursor: pointer;
        }
        
        .btn-primary-custom:hover:not(:disabled) {
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
        
        .btn-primary-custom:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .auth-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
        }
        
        .success-msg {
            display: none;
            background-color: #d4edda;
            border: 2px solid #28a745;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #155724;
            font-weight: 600;
            align-items: center;
            gap: 0.5rem;
        }
        
        .error-msg {
            display: none;
            background-color: #f8d7da;
            border: 2px solid #dc3545;
            border-radius: 8px;
            padding: 1rem;
            margin-bottom: 1.5rem;
            color: #721c24;
            font-weight: 600;
            align-items: center;
            gap: 0.5rem;
        }
        
        .verification-icon {
            font-size: 3rem;
            color: var(--primary-color);
            margin-bottom: 1rem;
        }
        
        .email-display {
            background-color: var(--light-gray);
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 1rem;
            margin: 1.5rem 0;
            word-break: break-all;
            color: var(--black);
            font-weight: 600;
        }
        
        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }
        
        .resend-link {
            margin-top: 1rem;
            text-align: center;
            font-size: 0.9rem;
        }
        
        .resend-link button {
            background: none;
            border: none;
            color: var(--primary-color);
            font-weight: 700;
            cursor: pointer;
            text-decoration: underline;
            padding: 0;
        }
        
        .resend-link button:hover {
            text-decoration-line: underline;
        }
        
        input,
        textarea,
        select {
            background-color: var(--white) !important;
            color: var(--black) !important;
            border-color: var(--black) !important;
        }
    </style>
</head>

<body>
    <div class="auth-page" style="position:relative">
        <div style="position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(135deg, #ff006e 0%, #a100f2 100%);border-bottom:2px solid #000;z-index:-1"></div>

        <div style="position:absolute;top:1.5rem;left:2rem">
            <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;color:#666;font-size:0.9rem;text-decoration:none">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>

        <div class="auth-card page-enter">
            <div class="auth-logo">Resume<span>Craft</span></div>

            <div style="text-align:center">
                <div class="verification-icon">
                    <i class="bi bi-envelope-check"></i>
                </div>
                <h1 class="auth-title">Verify Your Email</h1>
                <p class="auth-sub">We sent a verification link to</p>
            </div>

            <div class="email-display" id="emailDisplay">loading...</div>

            <div class="error-msg" id="errorMsg"><i class="bi bi-exclamation-circle me-2"></i><span id="errorText"></span></div>
            <div class="success-msg" id="successMsg"><i class="bi bi-check-circle me-2"></i><span id="successText">Email verified! Redirecting to dashboard...</span></div>

            <div style="text-align:center;margin-top:2rem">
                <p style="margin-bottom:1.5rem;font-size:0.95rem;color:#666">
                    Didn't receive the email? Check your spam folder or follow a link you received.
                </p>

                <button class="btn-primary-custom" style="width:100%;font-size:1rem" onclick="handleVerificationCheck()" id="checkBtn">
                    <span id="checkBtnText">Verify Email</span>
                    <div class="spinner" id="spinner" style="display:none;margin-left:0.5rem"></div>
                </button>

                <div class="resend-link">
                    <p style="margin-bottom:0.5rem">Haven't received the verification link?</p>
                    <button onclick="handleResendEmail()" id="resendBtn">Send verification email again</button>
                </div>

                <div style="margin-top:2rem;padding-top:1.5rem;border-top:1px solid #ddd">
                    <a href="#" onclick="handleLogout()" style="color:#666;font-size:0.9rem;text-decoration:none">
                        Not your account? <span style="color:var(--primary-color);font-weight:700">Sign out</span>
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { checkEmailVerification, resendEmailVerification, logOut, getCurrentUser, onAuthChange } from './js/auth.js'; /* REDIRECT IF NOT AUTHENTICATED OR EMAIL ALREADY VERIFIED */ onAuthChange(user => { if (!user) { window.location.href = 'login.html';
        } else if (user.emailVerified) { window.location.href = 'dashboard.html'; } else { // Display user email document.getElementById('emailDisplay').textContent = user.email; } }); /* CHECK IF EMAIL IS VERIFIED */ window.handleVerificationCheck =
        async () => { const btn = document.getElementById('checkBtn'); const btnText = document.getElementById('checkBtnText'); const spinner = document.getElementById('spinner'); const errorMsg = document.getElementById('errorMsg'); btn.disabled = true;
        btnText.textContent = 'Checking...'; spinner.style.display = 'inline-block'; errorMsg.style.display = 'none'; try { const isVerified = await checkEmailVerification(); if (isVerified) { document.getElementById('successMsg').style.display = 'flex';
        setTimeout(() => { window.location.href = 'dashboard.html'; }, 2000); } else { const errorText = document.getElementById('errorText'); errorText.textContent = 'Email not verified yet. Please check your inbox and click the verification link.';
        errorMsg.style.display = 'flex'; btn.disabled = false; btnText.textContent = 'Verify Email'; spinner.style.display = 'none'; } } catch (err) { console.error('Verification check error:', err); const errorText = document.getElementById('errorText');
        errorText.textContent = 'Failed to check email verification status.'; errorMsg.style.display = 'flex'; btn.disabled = false; btnText.textContent = 'Verify Email'; spinner.style.display = 'none'; } }; /* RESEND VERIFICATION EMAIL */ window.handleResendEmail
        = async () => { const btn = document.getElementById('resendBtn'); const errorMsg = document.getElementById('errorMsg'); const successMsg = document.getElementById('successMsg'); btn.disabled = true; try { await resendEmailVerification(); successMsg.style.display
        = 'flex'; document.getElementById('successText').textContent = 'Verification email sent! Check your inbox.'; errorMsg.style.display = 'none'; setTimeout(() => { successMsg.style.display = 'none'; btn.disabled = false; }, 3000); } catch (err) {
        console.error('Resend email error:', err); const errorText = document.getElementById('errorText'); errorText.textContent = 'Failed to resend verification email. Please try again.'; errorMsg.style.display = 'flex'; btn.disabled = false; } }; /*
        LOGOUT */ window.handleLogout = async () => { try { await logOut(); window.location.href = 'login.html'; } catch (err) { console.error('Logout error:', err); } }; /* AUTO-CHECK EVERY 3 SECONDS IF EMAIL IS VERIFIED */ setInterval(async () => {
        try { const user = getCurrentUser(); if (user && !user.emailVerified) { const isVerified = await checkEmailVerification(); if (isVerified) { window.location.href = 'dashboard.html'; } } } catch (err) { console.error('Auto-check error:', err);
        } }, 3000);
    </script>
</body>

</html>
