<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — ResumeCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        :root {
            --primary-color: #ff006e;
            --secondary-color: #a100f2;
            --black: #000000;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --border-width: 2px;
            --border-radius: 12px;
            --shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            --shadow-hover: 12px 12px 0px rgba(0, 0, 0, 0.3);
        }
        
        body {
            background-color: var(--white) !important;
            color: var(--black) !important;
        }
        
        h1, h2, h3, h4, h5, h6, .form-label, .auth-title, .auth-sub {
            color: var(--black) !important;
        }
        
        p, a {
            color: var(--black) !important;
        }
        
        .auth-card {
            border: var(--border-width) solid var(--black);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            background-color: rgba(255, 255, 255, 0.98) !important;
            color: var(--black);
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        
        .auth-logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--black);
        }
        
        .form-group input, .form-group button {
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            transition: all 0.3s ease;
            color: var(--black) !important;
        }
        
        .form-group input::placeholder {
            color: #999 !important;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1);
        }
        
        .auth-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        
        .auth-btn:hover {
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
        
        .auth-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
        }
        
        input, textarea, select {
            background-color: var(--white) !important;
            color: var(--black) !important;
            border-color: var(--black) !important;
        }
        
        input::placeholder, textarea::placeholder {
            color: #999 !important;
        }
    </style>
</head>

<body>
    <div class="auth-page" style="position:relative">
        <div style="position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(135deg, #ff006e 0%, #a100f2 100%);border-bottom:2px solid #000;z-index:-1"></div>
        <div style="position:absolute;top:1.5rem;left:2rem">
            <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;color:var(--text-muted);font-size:0.9rem;text-decoration:none">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>

        <div class="auth-card page-enter">
            <div class="auth-logo">Resume<span>Craft</span></div>
            <h1 class="auth-title">Create Account</h1>
            <p class="auth-sub">Start building professional resumes today</p>

            <div class="error-msg" id="errorMsg"><i class="bi bi-exclamation-circle me-2"></i><span id="errorText"></span></div>
            <div class="success-msg" id="successMsg"><i class="bi bi-check-circle me-2"></i><span id="successText"></span></div>

            <div>
                <div class="form-group">
                    <label class="form-label">Full Name</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-person input-icon"></i>
                        <input type="text" class="form-control" id="nameInput" placeholder="John Doe" autocomplete="name">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="emailInput" placeholder="john@example.com" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="passwordInput" placeholder="Min. 8 characters" autocomplete="new-password">
                        <button type="button" onclick="togglePwd('passwordInput','eyeIcon')" style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
                            <i class="bi bi-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Confirm Password</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock-fill input-icon"></i>
                        <input type="password" class="form-control" id="confirmInput" placeholder="Repeat password" autocomplete="new-password">
                    </div>
                </div>

                <div style="display:flex;align-items:flex-start;gap:0.6rem;margin-bottom:1.5rem">
                    <input type="checkbox" id="termsCheck" style="margin-top:3px;accent-color:var(--accent)">
                    <label for="termsCheck" style="font-size:0.85rem;color:var(--text-muted)">I agree to the <a href="#" style="color:var(--accent)">Terms of Service</a> and <a href="#" style="color:var(--accent)">Privacy Policy</a></label>
                </div>

                <button class="btn-primary-custom ripple" style="width:100%;justify-content:center;font-size:1rem;padding:0.85rem" onclick="handleSignup()" id="signupBtn">
                    <span id="btnText">Create Account</span>
                    <div class="spinner" id="spinner" style="display:none"></div>
                </button>
            </div>

            <div class="auth-link">Already have an account? <a href="login.html">Sign in</a></div>
        </div>
    </div>

    <script type="module">
        import { signUp, onAuthChange } from './js/auth.js';

        onAuthChange(user => {
            if (user) window.location.href = 'dashboard.html';
        });

        window.togglePwd = (inputId, iconId) => {
            const input = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'bi bi-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'bi bi-eye';
            }
        };

        window.handleSignup = async () => {
            const name = document.getElementById('nameInput').value.trim();
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value;
            const confirm = document.getElementById('confirmInput').value;
            const terms = document.getElementById('termsCheck').checked;
            const errorMsg = document.getElementById('errorMsg');
            const errorText = document.getElementById('errorText');
            const showError = (msg) => {
                errorText.textContent = msg;
                errorMsg.style.display = 'flex';
                document.getElementById('successMsg').style.display = 'none';
            };
            errorMsg.style.display = 'none';
            if (!name) return showError('Please enter your full name.');
            if (!email) return showError('Please enter your email address.');
            if (!password || password.length < 8) return showError('Password must be at least 8 characters.');
            if (password !== confirm) return showError('Passwords do not match.');
            if (!terms) return showError('Please accept the terms to continue.');
            const btn = document.getElementById('signupBtn');
            const btnText = document.getElementById('btnText');
            const spinner = document.getElementById('spinner');
            btn.disabled = true;
            btnText.textContent = 'Creating Account...';
            spinner.style.display = 'block';
            try {
                await signUp(name, email, password);
                document.getElementById('successMsg').style.display = 'flex';
                document.getElementById('successText').textContent = 'Account created! Redirecting...';
                setTimeout(() => window.location.href = 'dashboard.html', 1200);
            } catch (err) {
                const msgs = {
                    'auth/email-already-in-use': 'This email is already registered.',
                    'auth/invalid-email': 'Please enter a valid email address.',
                    'auth/weak-password': 'Password is too weak. Use 8+ characters.',
                };
                showError(msgs[err.code] || err.message || 'Signup failed. Please try again.');
                btn.disabled = false;
                btnText.textContent = 'Create Account';
                spinner.style.display = 'none';
            }
        };

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') window.handleSignup();
        });
    </script>
</body>
</html>
