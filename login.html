<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ResumeCraft</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ========== NEO-BRUTALISM OVERRIDE STYLES ========== */
        
         :root {
            --primary-color: #ff006e;
            --secondary-color: #a100f2;
            --black: #000000;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --border-width: 2px;
            --border-radius: 12px;
            --shadow: 8px 8px 0px rgba(0, 0, 0, 0.2);
            --shadow-hover: 12px 12px 0px rgba(0, 0, 0, 0.3);
        }
        
        body {
            background-color: var(--white) !important;
            color: var(--black) !important;
        }
        
        h1,
        h2,
        h3,
        h4,
        h5,
        h6,
        .form-label,
        .auth-title,
        .auth-sub {
            color: var(--black) !important;
        }
        
        p,
        a {
            color: var(--black) !important;
        }
        
        .auth-card {
            border: var(--border-width) solid var(--black);
            border-radius: var(--border-radius);
            box-shadow: var(--shadow);
            background-color: rgba(255, 255, 255, 0.98) !important;
            color: var(--black);
            backdrop-filter: blur(10px);
            margin-top: 2rem;
        }
        
        .auth-logo {
            font-weight: 900;
            font-size: 1.5rem;
            letter-spacing: -0.02em;
            color: var(--black);
        }
        
        .form-group input,
        .form-group button {
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            transition: all 0.3s ease;
            color: var(--black) !important;
        }
        
        .form-group input::placeholder {
            color: #999 !important;
        }
        
        .form-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(255, 0, 110, 0.1);
        }
        
        .auth-btn {
            background-color: var(--primary-color);
            color: var(--white);
            border: var(--border-width) solid var(--black);
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-weight: 700;
            transition: all 0.3s ease;
        }
        
        .auth-btn:hover {
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
        
        .auth-link {
            color: var(--primary-color);
            font-weight: 700;
            text-decoration: none;
        }
        
        input,
        textarea,
        select {
            background-color: var(--white) !important;
            color: var(--black) !important;
            border-color: var(--black) !important;
        }
        
        input::placeholder,
        textarea::placeholder {
            color: #999 !important;
        }
        
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
            color: #999;
        }
        
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background-color: #ddd;
        }
        
        .google-btn {
            width: 100%;
            padding: 0.85rem;
            border: 2px solid #000;
            border-radius: 8px;
            background-color: #fff;
            color: #000;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1rem;
        }
        
        .google-btn:hover {
            box-shadow: var(--shadow-hover);
            transform: translate(-2px, -2px);
        }
    </style>
</head>

<body>
    <div class="auth-page" style="position:relative">
        <div style="position:absolute;top:0;left:0;right:0;height:180px;background:linear-gradient(135deg, #ff006e 0%, #a100f2 100%);border-bottom:2px solid #000;z-index:-1"></div>
        <div style="position:absolute;top:1.5rem;left:2rem">
            <a href="index.html" style="display:flex;align-items:center;gap:0.5rem;color:var(--text-muted);font-size:0.9rem;text-decoration:none">
                <i class="bi bi-arrow-left"></i> Back to Home
            </a>
        </div>

        <div class="auth-card page-enter">
            <div class="auth-logo">Resume<span>Craft</span></div>
            <h1 class="auth-title">Welcome Back</h1>
            <p class="auth-sub">Sign in to access your resumes</p>

            <div class="error-msg" id="errorMsg"><i class="bi bi-exclamation-circle me-2"></i><span id="errorText"></span></div>
            <div class="success-msg" id="successMsg"><i class="bi bi-check-circle me-2"></i>Logged in! Redirecting...</div>

            <div>
                <div class="form-group">
                    <label class="form-label">Email Address</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-envelope input-icon"></i>
                        <input type="email" class="form-control" id="emailInput" placeholder="john@example.com" autocomplete="email">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Password</label>
                    <div class="input-icon-wrap">
                        <i class="bi bi-lock input-icon"></i>
                        <input type="password" class="form-control" id="passwordInput" placeholder="Your password" autocomplete="current-password">
                        <button type="button" onclick="togglePwd()" style="position:absolute;right:0.9rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer">
            <i class="bi bi-eye" id="eyeIcon"></i>
          </button>
                    </div>
                </div>

                <div style="display:flex;justify-content:flex-end;margin-bottom:1.5rem">
                    <a href="#" onclick="handleReset(event)" style="font-size:0.88rem;color:var(--accent)">Forgot password?</a>
                </div>

                <button class="btn-primary-custom ripple" style="width:100%;justify-content:center;font-size:1rem;padding:0.85rem" onclick="handleLogin()" id="loginBtn">
        <span id="btnText">Sign In</span>
        <div class="spinner" id="spinner" style="display:none"></div>
      </button>
      
      <div class="divider">OR</div>
      
      <button type="button" class="google-btn" onclick="handleGoogleLogin()" id="googleBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
              <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
              <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
              <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          <span id="googleBtnText">Sign in with Google</span>
      </button>
            </div>

            <div class="auth-link">Don't have an account? <a href="signup.html">Create one free</a></div>
        </div>
    </div>

    <script type="module">
        import { signIn, signInWithGoogle, resetPassword, onAuthChange } from "./js/auth.js";

        /* REDIRECT IF LOGGED IN */
        onAuthChange((user) => {
            if (user) {
                if (!user.emailVerified) {
                    window.location.href = "email-verification.html";
                } else {
                    window.location.href = "dashboard.html";
                }
            }
        });

        /* PASSWORD SHOW / HIDE */
        window.togglePwd = () => {
            const input = document.getElementById("passwordInput");
            const icon = document.getElementById("eyeIcon");
            if (input.type === "password") {
                input.type = "text";
                icon.className = "bi bi-eye-slash";
            } else {
                input.type = "password";
                icon.className = "bi bi-eye";
            }
        };

        /* LOGIN FUNCTION */
        window.handleLogin = async () => {
            const email = document.getElementById("emailInput").value.trim();
            const password = document.getElementById("passwordInput").value;
            const errorMsg = document.getElementById("errorMsg");
            const errorText = document.getElementById("errorText");
            const successMsg = document.getElementById("successMsg");
            const btn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const spinner = document.getElementById("spinner");

            const showError = (msg) => {
                errorText.textContent = msg;
                errorMsg.style.display = "flex";
                successMsg.style.display = "none";
            };

            errorMsg.style.display = "none";

            if (!email) {
                return showError("Please enter your email.");
            }
            if (!password) {
                return showError("Please enter your password.");
            }

            btn.disabled = true;
            btnText.textContent = "Signing in...";
            spinner.style.display = "block";

            try {
                await signIn(email, password);
                successMsg.style.display = "flex";
                setTimeout(() => {
                    window.location.href = "email-verification.html";
                }, 1000);
            } catch (err) {
                const messages = {
                    "auth/user-not-found": "No account found with this email.",
                    "auth/wrong-password": "Incorrect password.",
                    "auth/invalid-credential": "Invalid email or password.",
                    "auth/too-many-requests": "Too many attempts. Please try again later."
                };
                showError(messages[err.code] || err.message || "Login failed. Please try again.");
                btn.disabled = false;
                btnText.textContent = "Sign In";
                spinner.style.display = "none";
            }
        };
        
        /* GOOGLE LOGIN FUNCTION */
        window.handleGoogleLogin = async () => {
            const btn = document.getElementById("googleBtn");
            const btnText = document.getElementById("googleBtnText");
            btn.disabled = true;
            btnText.textContent = "Signing in...";
            
            try {
                await signInWithGoogle();
                document.getElementById("successMsg").style.display = "flex";
                setTimeout(() => {
                    window.location.href = "dashboard.html";
                }, 1000);
            } catch (err) {
                const errorMsg = document.getElementById("errorMsg");
                const errorText = document.getElementById("errorText");
                const msgs = {
                    "auth/popup-closed-by-user": "Sign in was cancelled.",
                    "auth/account-exists-with-different-credential": "An account already exists with this email."
                };
                errorText.textContent = msgs[err.code] || err.message || "Google sign in failed. Please try again.";
                errorMsg.style.display = "flex";
                btn.disabled = false;
                btnText.textContent = "Sign in with Google";
            }
        };

        /* PASSWORD RESET */
        window.handleReset = async (e) => {
            e.preventDefault();
            const email = document.getElementById("emailInput").value.trim();
            const errorMsg = document.getElementById("errorMsg");
            const errorText = document.getElementById("errorText");
            const successMsg = document.getElementById("successMsg");

            if (!email) {
                errorText.textContent = "Enter your email above first.";
                errorMsg.style.display = "flex";
                return;
            }

            try {
                await resetPassword(email);
                successMsg.style.display = "flex";
                successMsg.innerHTML = '<i class="bi bi-check-circle me-2"></i>Reset link sent! Check your inbox.';
                errorMsg.style.display = "none";
            } catch (err) {
                errorText.textContent = "Failed to send reset email.";
                errorMsg.style.display = "flex";
            }
        };

        /* ENTER KEY LOGIN */
        document.addEventListener("keydown", (e) => {
            if (e.key === "Enter") {
                window.handleLogin();
            }
        });
    </script>
</body>

</html>
