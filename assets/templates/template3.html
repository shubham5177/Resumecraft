<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Open+Sans:wght@300;400;600&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Open Sans',sans-serif;color:#e0f0e8;background:#0f2027;font-size:0.88rem;line-height:1.6}
.header{background:linear-gradient(135deg,#0f2027,#203a43);padding:2.5rem;border-bottom:2px solid rgba(67,233,123,0.3)}
.name{font-family:'Rajdhani',sans-serif;font-size:2rem;font-weight:700;color:#fff;border-left:4px solid #43E97B;padding-left:1rem}
.contact{font-size:0.8rem;color:rgba(255,255,255,0.6);margin-top:0.4rem;padding-left:1.25rem;display:flex;flex-wrap:wrap;gap:0.5rem 1rem}
.body{padding:2rem 2.5rem;background:#0f2027}
.section-title{font-family:'Rajdhani',sans-serif;font-size:0.75rem;font-weight:700;text-transform:uppercase;letter-spacing:0.12em;color:#43E97B;margin-bottom:0.75rem;margin-top:1.4rem}
.skill{background:rgba(67,233,123,0.12);color:#43E97B;padding:0.2rem 0.7rem;border-radius:4px;font-size:0.78rem;font-weight:600;border:1px solid rgba(67,233,123,0.25);display:inline-block;margin:2px}
.item-title{font-weight:700;color:#fff}
.item-sub{color:rgba(224,240,232,0.6);font-size:0.8rem}
</style>
</head>
<body>
<div class="header">
  <div class="name">Executive Template</div>
  <div class="contact">Professional dark theme resume</div>
</div>
<div class="body">
  <div class="section-title">Skills</div>
  <span class="skill">React</span><span class="skill">Node.js</span>
</div>
</body>
</html>
