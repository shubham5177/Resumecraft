<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;color:#1a1a2e;background:#fff;padding:2.5rem;font-size:0.88rem;line-height:1.6}
.header{border-bottom:3px solid #6C63FF;padding-bottom:1.5rem;margin-bottom:1.5rem;display:flex;align-items:center;gap:1.5rem}
.photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid #6C63FF;flex-shrink:0}
.name{font-size:1.8rem;font-weight:800;letter-spacing:-0.02em}
.contact{color:#666;font-size:0.8rem;margin-top:0.35rem;display:flex;flex-wrap:wrap;gap:0.5rem 1rem}
.section-title{font-size:0.68rem;font-weight:800;text-transform:uppercase;letter-spacing:0.12em;color:#6C63FF;margin-bottom:0.75rem;margin-top:1.4rem}
.edu-item,.proj-item,.cert-item{margin-bottom:0.9rem;border-left:3px solid #6C63FF;padding-left:0.75rem}
.item-title{font-weight:700;font-size:0.9rem}
.item-sub{color:#666;font-size:0.8rem}
.item-desc{font-size:0.82rem;margin-top:0.35rem;color:#444;line-height:1.6}
.skills{display:flex;flex-wrap:wrap;gap:0.4rem}
.skill{background:#f0eeff;color:#6C63FF;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;border:1px solid #D4D0FF}
.tech{font-size:0.78rem;color:#6C63FF;font-style:italic}
.proj-header{display:flex;justify-content:space-between;align-items:flex-start}
.date{font-size:0.78rem;color:#888;white-space:nowrap}
.summary{color:#444;font-size:0.85rem;line-height:1.7;margin-bottom:1.4rem}
</style>
</head>
<body>

</html>
