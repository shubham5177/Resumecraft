<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Lato',sans-serif;color:#2d2d2d;background:#fff;font-size:0.88rem;line-height:1.6}
.header-bar{background:#6C63FF;color:#fff;padding:2rem 2.5rem;display:flex;align-items:center;gap:1.5rem}
.photo{width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid rgba(255,255,255,0.5);flex-shrink:0}
.name{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700}
.contact{font-size:0.8rem;opacity:0.85;margin-top:0.4rem;display:flex;flex-wrap:wrap;gap:0.5rem 1rem}
.body{padding:2rem 2.5rem}
.section-title{font-family:'Playfair Display',serif;font-size:1rem;color:#6C63FF;border-bottom:2px solid #6C63FF;padding-bottom:0.4rem;margin-bottom:0.8rem;margin-top:1.4rem}
.skill{background:#f0eeff;color:#6C63FF;padding:0.25rem 0.75rem;border-radius:20px;font-size:0.78rem;font-weight:600;border:1px solid #D4D0FF;display:inline-block;margin:2px}
.summary-box{background:#f8f7ff;padding:1rem;border-left:4px solid #6C63FF;border-radius:0 8px 8px 0;font-style:italic;color:#444;font-size:0.85rem;line-height:1.7;margin-bottom:1.4rem}
</style>
</head>
<body>
<div class="header-bar">
  <div class="name">Clean White Template</div>
</div>
<div class="body">Professional resume template with clean layout.</div>
</body>
</html>
